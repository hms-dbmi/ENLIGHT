name: enlight
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip>=23.0
  - pip:
    # Core deep learning
    - torch==2.1.2
    - torchvision==0.16.2

    # Vision encoders
    - open-clip-torch==2.23.0
    - timm==0.6.13
    - einops==0.6.1
    - einops-exts==0.0.4

    # LLM / multimodal
    # transformers<5.0: avoids huggingface_hub>=1.3 requirement from 5.x
    # tokenizers>=0.19: required by transformers>=4.45 (0.15.x is too old)
    - transformers>=4.45.0,<5.0
    - tokenizers>=0.19,<0.21
    - huggingface_hub>=0.23.2,<1.0
    - sentencepiece==0.1.99
    - peft==0.13.2
    - accelerate>=1.1.0
    - bitsandbytes

    # Utilities
    - shortuuid
    - numpy
    - scikit-learn==1.2.2
    - pydantic
    - protobuf==3.20.3

    # Serving / API
    - gradio==4.16.0
    - gradio_client==0.8.1
    - requests
    - httpx==0.24.0
    - uvicorn
    - fastapi
    - markdown2[all]

    # Install enlight package itself
    - -e .
